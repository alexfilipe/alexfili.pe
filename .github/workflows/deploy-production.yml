name: Deploy alexfili.pe production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type alexfili.pe to deploy the selected ref to production"
        required: true
        type: string

run-name: Deploy alexfili.pe from ${{ github.ref_name }} by @${{ github.actor }}

concurrency:
  group: alexfili-pe-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://alexfili.pe
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Confirm production deploy
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "alexfili.pe" ]; then
            echo "Confirmation did not match alexfili.pe"
            exit 1
          fi

      - name: Checkout selected ref
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build:production

      - name: Deploy to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.production.jsonc --message "alexfili.pe production deploy ${{ github.sha }}"
